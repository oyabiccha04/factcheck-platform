  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Logs (v2 preview)</title>
  <meta name="robots" content="noindex" />
  <style>
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      margin: 24px;
      line-height: 1.6;
    }
    .box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
      max-width: 960px;
    }
    pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .muted { color: #666; }
    .ok { color: #0a7; font-weight: bold; }
    .error { color: #c00; font-weight: bold; }
  </style>
</head>

<body>
  <h1>Logs (v2 preview)</h1>

  <div class="box">
    <p class="ok">✅ プレビュー専用ページ（既存 logs.html は未変更）</p>
    <p class="muted">
      新しい event / statement 構造の JSON を
      「読めること」だけを確認するためのページです。
      表示整形・評価・解釈は行いません。
    </p>

    <h2>読み込み結果（生JSON）</h2>
    <pre id="out">Loading...</pre>

    <p class="muted">
      参照元:
      <code>data/events/index.json</code>
    </p>
  </div>

  <!-- ✅ 正しい script タグ（ここが最重要） -->
  <script src="./scripts/data_loader_v1.js"></script>

  <script>
    (async () => {
      try {
        if (!window.__factcheckDataLoader) {
          throw new Error('Data loader is not loaded');
        }

        const index = await window.__factcheckDataLoader.loadEventIndex();

        const events = [];
        if (index && Array.isArray(index.events)) {
          for (const e of index.events) {
            if (e && typeof e.file === 'string') {
              const ev = await window.__factcheckDataLoader.loadEventData(e.file);
              events.push({ meta: e, data: ev });
            }
          }
        }

        const payload = {
          loaded_at: new Date().toISOString(),
          index,
          loaded_events: events
        };

        document.getElementById('out').textContent =
          JSON.stringify(payload, null, 2);
      } catch (err) {
        document.getElementById('out').textContent =
          'ERROR: ' + (err && err.message ? err.message : String(err));
      }
    })();
  </script>
</body>
</html>
